<!DOCTYPE html>
<html>
  <head>
    <title>
      Game of luck
    </title>
    <link rel="stylesheet" href="styles/game.css">
  </head>
  <body>
    <p class="title">ROCK PAPER SCISSORS</p>
    <div class="parent">
      <div>
    <button onclick="your_choice='rock'; play()"><img src="rock-emoji.png" class="move-icon">
    </button>
    <button onclick="your_choice='paper'; play()"><img src="paper-emoji.png" class="move-icon">
    </button>
    <button onclick="your_choice='scissors'; play()"><img src="scissors-emoji.png" class="move-icon">
    </button>
    </div>
    <p class="result js-result"></p>
    <p class="choice js-choice"></p>
    <p class="score js-score"></p>
    <button class="reset" onclick="reset();">Reset</button></div>
    <script src="scripts/game.js"></script>
  </body>
</html>
